<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>Trevour_Sithole | Official Artist Site</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --spotify-green: #1DB954;
            --spotify-black: #121212;
            --spotify-card: #181818;
            --spotify-gray: #B3B3B3;
            --live-red: #FF0000;
            --apple-pink: #FC3C44;
        }

        body {
            background-color: var(--spotify-black);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* LIVE BANNER */
        .live-banner {
            background: linear-gradient(90deg, #000, #111);
            color: white;
            text-align: center;
            padding: 12px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 2px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #222;
            text-transform: uppercase;
        }

        .pulse {
            width: 8px; height: 8px;
            background: var(--live-red);
            border-radius: 50%;
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(255, 0, 0, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0px rgba(255, 0, 0, 0); }
        }

        /* Hero Header */
        header {
            padding: 60px 20px;
            background: radial-gradient(circle at center, #1db95415 0%, transparent 70%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* PROFILE IMAGE STYLING */
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--spotify-green);
            box-shadow: 0 0 20px rgba(29, 185, 84, 0.3);
            margin-bottom: 20px;
        }

        h1 { 
            font-size: clamp(2.2rem, 8vw, 4.5rem); 
            margin: 0; 
            letter-spacing: -2px; 
            text-transform: uppercase; 
            line-height: 1;
        }
        
        .handle { 
            color: var(--spotify-green); 
            font-weight: bold; 
            margin-top: 10px; 
            font-size: 1rem; 
            letter-spacing: 3px;
        }

        /* PLATFORMS HUB */
        .hub-container {
            max-width: 500px;
            margin: 0 auto 40px;
            padding: 0 20px;
        }

        .platform-link {
            background: var(--spotify-card);
            display: flex;
            align-items: center;
            padding: 14px 22px;
            margin-bottom: 10px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .platform-link:hover {
            background: #252525;
            transform: translateY(-3px);
            border-color: #444;
        }

        /* DISCOGRAPHY */
        .content-section { padding: 40px 8%; }
        .section-title { font-size: 1.6rem; margin-bottom: 30px; border-left: 4px solid var(--spotify-green); padding-left: 15px; }
        
        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .album-card {
            background: var(--spotify-card);
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .album-card:hover { background: #282828; }
        .album-card img { width: 100%; aspect-ratio: 1/1; border-radius: 8px; margin-bottom: 12px; }

        /* NEWSLETTER SECTION */
        .newsletter {
            background: var(--spotify-green);
            color: black;
            padding: 50px 20px;
            text-align: center;
            border-radius: 20px;
            margin: 40px 8%;
        }

        .newsletter h2 { font-weight: 900; margin-top: 0; }
        .newsletter input { 
            padding: 12px 20px; border-radius: 50px; border: none; 
            width: 100%; max-width: 250px; margin-bottom: 10px;
        }
        .newsletter button { 
            background: black; color: white; padding: 12px 30px; 
            border-radius: 50px; border: none; font-weight: 900; cursor: pointer;
        }

        footer {
            padding: 60px 20px;
            text-align: center;
            border-top: 1px solid #222;
        }

        .socials a { color: white; margin: 0 15px; font-size: 1.8rem; }

    </style>
</head>
<body>

    <div class="live-banner">

        Stream the New Album "IPHOKOPHOKO" Now

    <header>

            <span style="font-size: 0.65rem; font-weight: bold; color: #4CB3FF; letter-spacing: 2px;">VERIFIED ARTIST</span>
        </div>
        <h1>Trevour_Sithole</h1>
        <div class="handle">TREVOUR_SITHOLE</div>

    <div class="hub-container">

            <i class="fab fa-spotify" style="color: var(--spotify-green); font-size: 1.4rem; width: 40px;"></i>
            <span style="flex-grow: 1; font-weight: 700;">Spotify</span>
            <span style="font-size: 0.6rem; color: var(--spotify-gray); border: 1px solid #444; padding: 2px 6px; border-radius: 4px;">LISTEN</span>

            <span style="flex-grow: 1; font-weight: 700;">Apple Music</span>
            <span style="font-size: 0.6rem; color: var(--spotify-gray); border: 1px solid #444; padding: 2px 6px; border-radius: 4px;">OPEN</span>
        </a>

        <a href="https://www.youtube.com/@Trevour_Sithole" target="_blank" class="platform-link">

    <main class="content-section">

        <div class="album-grid">
            <a href="https://open.spotify.com/album/6Bhxk2KEhJxIAJpAtD8bej?si=Rme_pbsjSv-D57DuTfp3XA" target="_blank" class="album-card">
                <img src="IPHOKOPHOK.jpeg" alt="IPHOKOPHOKO">

            </a>
            <a href="https://open.spotify.com/album/2TJ4xFcNQFmXPJ51RM0QJ2?si=TSI6D27iStyIombDsKDBRg" target="_blank" class="album-card">
                <img src="JACK OF ENERGIA PT.1.jpeg" alt="Jack OG">
                <h3>JACK OF ENERGIA PT.1</h3>
                <p>2025 • Album</p>
            </a>
        </div>
    </main>

    <footer>
        <div class="socials">
            <a href="https://www.tiktok.com/@trevour_sithole" target="_blank"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.youtube.com/@Trevour_Sithole" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://www.instagram.com/trevour_sithole" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>
        <p style="margin-top: 30px; font-weight: 800; letter-spacing: 2px;">TREVOUR_SITHOLE</p>
        <p style="font-size: 0.7rem; color: #444; margin-top: 10px;">© 2025 STEPUP MUSIC HUB.</p>
    </footer>

</body>
</html>
